name: Release unquarantine

on:
  push:
    tags:
      - 'unquarantine-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.21'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      arm64_sha: ${{ steps.build.outputs.arm64_sha }}
      amd64_sha: ${{ steps.build.outputs.amd64_sha }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/unquarantine-v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: jianzhoujz/unquarantine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        id: build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # arm64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o "unquarantine-${VERSION}-darwin-arm64" .
          
          # amd64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o "unquarantine-${VERSION}-darwin-amd64" .
          
          # Package
          tar -czf "unquarantine-${VERSION}-darwin-arm64.tar.gz" "unquarantine-${VERSION}-darwin-arm64"
          tar -czf "unquarantine-${VERSION}-darwin-amd64.tar.gz" "unquarantine-${VERSION}-darwin-amd64"
          
          # SHA256
          ARM64_SHA=$(shasum -a 256 "unquarantine-${VERSION}-darwin-arm64.tar.gz" | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 "unquarantine-${VERSION}-darwin-amd64.tar.gz" | awk '{print $1}')
          
          echo "arm64_sha=${ARM64_SHA}" >> $GITHUB_OUTPUT
          echo "amd64_sha=${AMD64_SHA}" >> $GITHUB_OUTPUT
          
          ls -lh *.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: unquarantine v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          repository: jianzhoujz/unquarantine
          files: |
            unquarantine-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
            unquarantine-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
          body: |
            ## Install
            
            ```bash
            brew tap jianzhoujz/tap
            brew install unquarantine
            ```
            
            ## Features
            
            - Auto elevation: runs with admin privileges when needed
            - Supports Apple Silicon (arm64) and Intel (amd64)
            - Scans /Applications and ~/Applications
            - Removes com.apple.quarantine attribute from unsigned apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-formula:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/unquarantine-v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM64_SHA="${{ needs.build.outputs.arm64_sha }}"
          AMD64_SHA="${{ needs.build.outputs.amd64_sha }}"
          FORMULA="Formula/unquarantine.rb"
          
          ruby - "${VERSION}" "${ARM64_SHA}" "${AMD64_SHA}" "${FORMULA}" <<'RUBY'
          version, arm64_sha, amd64_sha, path = ARGV
          
          content = File.read(path)
          content = content.sub(/version "[^"]+"/, "version \"#{version}\"")
          
          content = content.sub(
            /on_arm do\s+url "[^"]+"\s+sha256 "[^"]+"/,
            "on_arm do\n      url \"https://github.com/jianzhoujz/unquarantine/releases/download/v#{version}/unquarantine-#{version}-darwin-arm64.tar.gz\"\n      sha256 \"#{arm64_sha}\""
          )
          
          content = content.sub(
            /on_intel do\s+url "[^"]+"\s+sha256 "[^"]+"/,
            "on_intel do\n      url \"https://github.com/jianzhoujz/unquarantine/releases/download/v#{version}/unquarantine-#{version}-darwin-amd64.tar.gz\"\n      sha256 \"#{amd64_sha}\""
          )
          
          File.write(path, content)
          RUBY

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/unquarantine.rb
          git commit -m "unquarantine: update to v${VERSION}" || echo "No changes"
          git push